<title>สารบัญ Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f5e9ff,#e9d5ff,#d8b4fe);
    overflow:hidden;
}

/* อิโมจิลอย */

.floating{
    position:absolute;
    font-size:2rem;
    opacity:.7;
    animation:float 18s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(120vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

.f1{left:5%; animation-delay:0s;}
.f2{left:15%; animation-delay:2s;}
.f3{left:25%; animation-delay:4s;}
.f4{left:35%; animation-delay:6s;}
.f5{left:45%; animation-delay:8s;}
.f6{left:55%; animation-delay:10s;}
.f7{left:65%; animation-delay:12s;}
.f8{left:75%; animation-delay:14s;}
.f9{left:85%; animation-delay:16s;}

.card{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    z-index:10;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    color:#7e22ce;
    margin-bottom:25px;
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.menu a{
    text-decoration:none;
    background:#c084fc;
    color:white;
    padding:15px;
    border-radius:20px;
    transition:.3s;
    font-weight:bold;
}

.menu a:hover{
    background:#9333ea;
    transform:scale(1.05);
}

.back{
    display:inline-block;
    margin-top:25px;
    color:#7e22ce;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>
