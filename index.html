<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f3e8ff,#d8b4fe);
    overflow:hidden;
}

.card{
    width:80%;
    max-width:900px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:50px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#8b5cf6;
    margin-bottom:20px;
}

.profile{
    font-size:70px;
    margin:15px 0;
}

.name{
    font-size:28px;
    color:#6d28d9;
    font-weight:bold;
    margin-bottom:15px;
}

.text{
    font-size:18px;
    color:#555;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#a855f7;
    color:white;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#9333ea;
    transform:scale(1.05);
}

/* ตกแต่ง */

.rabbit1{
    position:absolute;
    top:20px;
    left:25px;
    font-size:45px;
}

.rabbit2{
    position:absolute;
    bottom:20px;
    right:25px;
    font-size:45px;
}

.star1{
    position:absolute;
    top:30px;
    right:120px;
    font-size:30px;
}

.star2{
    position:absolute;
    bottom:20px;
    left:25px;
    font-size:30px;
}

.heart{
    position:absolute;
    top:80px;
    right:50px;
    font-size:28px;
}

.cloud{
    position:absolute;
    bottom:80px;
    left:50px;
    font-size:35px;
}
</style>
</head>

<body>

<div class="card">

    <div class="rabbit1">🐰</div>
    <div class="rabbit2">🐰</div>
    <div class="star1">⭐</div>
    <div class="star2">⭐</div>
    <div class="heart">💜</div>
    <div class="cloud">☁️</div>

    <h1>ยินดีต้อนรับสู่โปรไฟล์ของฉัน</h1>

    <div class="profile">👩🏻</div>

    <div class="name">
        กานต์ธิดา ทีปกากร<br>
        (Kantida Teepakakorn)
    </div>

    <div class="text">
        สวัสดีค่ะ !<br><br>

        ขณะนี้กำลังสนใจด้าน<br>
        💜 Faculty of Veterinary Medicine<br>
        ⚙️ Engineering<br><br>

        นี่คือเว็บไซต์แรกของฉัน<br>
        ที่โฮสต์บน GitHub Pages
    </div>

    <a href="about.html" class="btn">
        ไปหน้าถัดไป ➜
    </a>

</div>

</body>
</html>
